name: Ansible CI

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-ci.yml"
  pull_request:
    paths:
      - "ansible/**"
      - ".github/workflows/ansible-ci.yml"

jobs:
  # ---------------------------------------------------------------------------
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ansible

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint .

  # ---------------------------------------------------------------------------
  molecule-generate-env-files:
    name: Molecule › generate_env_files
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ansible/roles/generate_env_files

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Molecule and Docker driver
        run: pip install ansible "molecule-plugins[docker]"

      - name: Run Molecule test
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  # ---------------------------------------------------------------------------
  molecule-generate-certs:
    name: Molecule › generate_certs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ansible/roles/generate_certs

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Molecule and Docker driver
        run: pip install ansible "molecule-plugins[docker]"

      - name: Run Molecule test
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  # ---------------------------------------------------------------------------
  molecule-setup-env:
    name: Molecule › setup_env
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ansible/roles/setup_env

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Molecule and Docker driver
        run: pip install ansible "molecule-plugins[docker]"

      - name: Run Molecule test
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  # ---------------------------------------------------------------------------
  molecule-setup-certs:
    name: Molecule › setup_certs
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ansible/roles/setup_certs

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Molecule and Docker driver
        run: pip install ansible "molecule-plugins[docker]"

      - name: Run Molecule test
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

  # ---------------------------------------------------------------------------
  summary:
    name: Ansible CI Summary
    runs-on: ubuntu-latest
    needs:
      - lint
      - molecule-generate-env-files
      - molecule-generate-certs
      - molecule-setup-env
      - molecule-setup-certs
    if: always()

    steps:
      - name: Check job status
        run: |
          RESULTS=(
            "${{ needs.lint.result }}"
            "${{ needs.molecule-generate-env-files.result }}"
            "${{ needs.molecule-generate-certs.result }}"
            "${{ needs.molecule-setup-env.result }}"
            "${{ needs.molecule-setup-certs.result }}"
          )
          FAILED=false
          for RESULT in "${RESULTS[@]}"; do
            if [ "$RESULT" != "success" ]; then
              FAILED=true
            fi
          done
          if [ "$FAILED" = "true" ]; then
            echo "❌ Ansible checks failed"
            exit 1
          fi
          echo "✅ All Ansible checks passed!"
