---
- name: Deploy Magic Mirror to backend server via k3s
  hosts: backend_server
  gather_facts: true
  become: true

  vars_prompt:
    - name: client_secret
      prompt: "Google OAuth2 Client Secret"
      private: true

    - name: geocode_api_key
      prompt: "Geocode Maps API Key"
      private: true

    - name: registry_url
      prompt: "Container registry URL (e.g. registry.example.com)"
      private: false
      default: "{{ registry_url }}"

    - name: letsencrypt_enabled
      prompt: "Enable Let's Encrypt TLS? (true/false)"
      private: false
      default: "false"

    - name: letsencrypt_email
      prompt: "Let's Encrypt email (required if enabled, press Enter to skip)"
      private: false
      default: ""

    - name: letsencrypt_domain
      prompt: "Public domain for Let's Encrypt (required if enabled, press Enter to skip)"
      private: false
      default: ""

  roles:
    - setup_backend
