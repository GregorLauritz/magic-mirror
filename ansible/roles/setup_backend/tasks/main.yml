---
- name: Update remote
  ansible.builtin.apt:
    update_cache: true
    autoclean: true
    autoremove: true
    upgrade: "dist"

- name: Install required packages
  ansible.builtin.apt:
    pkg: "{{ required_backend_packages }}"

- name: Stop service {{ service_name }}
  ansible.builtin.service:
    name: "{{ service_name }}"
    state: stopped
  failed_when: false  # service may not exist on first run

- name: Add the user
  ansible.builtin.user:
    name: "{{ user_name }}"
    shell: /bin/bash
    groups: sudo,docker
    append: true

- name: Delete code dirs in working dir
  ansible.builtin.file:
    state: absent
    path: "{{ work_dir }}/{{ item }}"
  loop: "{{ relevant_code_dirs }}"

- name: Copy code to remote
  ansible.builtin.synchronize:
    src: "{{ playbook_dir | dirname }}/{{ item }}"
    dest: "{{ work_dir }}"
    rsync_opts:
      - "--exclude=node_modules --exclude=dist --exclude='*.pem' --exclude='*.crt' --exclude='*.key'"
  loop: "{{ relevant_code_dirs }}"

- name: Create directory for mongo
  ansible.builtin.file:
    path: "{{ work_dir }}/mongo"
    state: directory
    mode: "0755"

- name: Install service
  ansible.builtin.template:
    src: "{{ service_name }}.service.j2"
    dest: "/etc/systemd/system/{{ service_name }}.service"
    mode: "0644"

- name: Install env files
  ansible.builtin.template:
    src: "{{ item.name }}.j2"
    dest: "{{ work_dir }}/{{ item.dest }}/{{ item.name }}"
    mode: "0600"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: true
  no_log: true
  loop:
    - name: .env
      dest: docker-compose
    - name: backend.env
      dest: docker-compose
    - name: frontend.env
      dest: docker-compose
    - name: proxy.env
      dest: docker-compose
    - name: oauth2-proxy.cfg
      dest: oauth2-proxy

- name: Get path to mkcert root CA
  ansible.builtin.command: mkcert -CAROOT
  changed_when: false
  register: ca_cert_path

- name: Copy CA cert
  ansible.builtin.copy:
    src: "{{ ca_cert_path.stdout }}/rootCA.pem"
    dest: "{{ work_dir }}/{{ item }}/rootCA.pem"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    remote_src: true
  loop:
    - certs
    - backend
    - oauth2-proxy

- name: Generate backend SSL certificate
  ansible.builtin.command: >-
    mkcert
    -key-file {{ work_dir }}/backend/ssl/express.key
    -cert-file {{ work_dir }}/backend/ssl/express.pem
    {{ server_fqdn }} backend {{ additional_hostnames }}
  changed_when: true

- name: Generate oauth2-proxy SSL certificate
  ansible.builtin.command: >-
    mkcert
    -key-file {{ work_dir }}/oauth2-proxy/ssl/{{ server_fqdn }}.key
    -cert-file {{ work_dir }}/oauth2-proxy/ssl/{{ server_fqdn }}.pem
    {{ server_fqdn }} {{ additional_hostnames }}
  changed_when: true

- name: Create oauth2-proxy certificate bundle (cert + CA)
  ansible.builtin.shell: >-
    cat {{ work_dir }}/oauth2-proxy/ssl/{{ server_fqdn }}.pem
    {{ work_dir }}/oauth2-proxy/rootCA.pem
    > {{ work_dir }}/oauth2-proxy/ssl/{{ server_fqdn }}.bundle.pem
  changed_when: true

- name: Set ownership of {{ work_dir }}
  ansible.builtin.file:
    path: "{{ work_dir }}"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: "0755"
    recurse: true

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start service {{ service_name }}
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: started
    enabled: true
