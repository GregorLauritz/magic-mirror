---
- name: Check if keel namespace exists
  ansible.builtin.command: k3s kubectl get namespace keel
  changed_when: false
  failed_when: false
  register: keel_ns

- name: Install Keel
  when: keel_ns.rc != 0
  block:
    - name: Apply Keel manifest
      ansible.builtin.command: >-
        k3s kubectl apply -f {{ work_dir }}/k8s/keel.yml
      changed_when: true

    - name: Wait for Keel deployment to be available
      ansible.builtin.command: >-
        k3s kubectl wait --for=condition=Available
        deployment/keel -n keel --timeout=120s
      changed_when: false
      retries: 3
      delay: 10
      register: keel_wait
      until: keel_wait.rc == 0
