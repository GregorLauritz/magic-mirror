---
- name: Check if Cilium CLI is installed
  ansible.builtin.stat:
    path: /usr/local/bin/cilium
  register: cilium_cli_binary

- name: Detect system architecture
  ansible.builtin.set_fact:
    cilium_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

- name: Install Cilium CLI
  when: not cilium_cli_binary.stat.exists
  block:
    - name: Download Cilium CLI
      ansible.builtin.get_url:
        url: "https://github.com/cilium/cilium-cli/releases/download/v{{ cilium_version }}/cilium-linux-{{ cilium_arch }}.tar.gz"
        dest: /tmp/cilium-cli.tar.gz
        mode: "0644"
        checksum: "sha256:https://github.com/cilium/cilium-cli/releases/download/v{{ cilium_version }}/cilium-linux-{{ cilium_arch }}.tar.gz.sha256sum"

    - name: Extract Cilium CLI
      ansible.builtin.unarchive:
        src: /tmp/cilium-cli.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"

    - name: Remove Cilium CLI archive
      ansible.builtin.file:
        path: /tmp/cilium-cli.tar.gz
        state: absent

- name: Check if Cilium is already deployed
  ansible.builtin.command: k3s kubectl get daemonset cilium -n kube-system
  changed_when: false
  failed_when: false
  register: cilium_deployed

- name: Install Cilium with WireGuard encryption
  ansible.builtin.command: >-
    cilium install
    --version {{ cilium_helm_version }}
    --set encryption.enabled=true
    --set encryption.type=wireguard
    --set encryption.nodeEncryption=true
    --set kubeProxyReplacement=true
    --set k8sServiceHost=127.0.0.1
    --set k8sServicePort=6443
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  when: cilium_deployed.rc != 0
  changed_when: true

- name: Wait for Cilium to be ready
  ansible.builtin.command: cilium status --wait --wait-duration 120s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  retries: 3
  delay: 15
