---
- name: Check if cert-manager namespace exists
  ansible.builtin.command: k3s kubectl get namespace cert-manager
  changed_when: false
  failed_when: false
  register: cert_manager_ns

- name: Install cert-manager
  when: cert_manager_ns.rc != 0
  block:
    - name: Apply cert-manager CRDs and resources
      ansible.builtin.command: >-
        k3s kubectl apply -f
        https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml
      changed_when: true

    - name: Wait for cert-manager CRDs to be established
      ansible.builtin.command: >-
        k3s kubectl wait --for=condition=Established
        crd/{{ item }}.cert-manager.io --timeout=120s
      loop:
        - certificates
        - certificaterequests
        - issuers
        - clusterissuers
        - challenges
        - orders
      changed_when: false

    - name: Wait for cert-manager deployments to be Available
      ansible.builtin.command: >-
        k3s kubectl wait --for=condition=Available
        deployment/{{ item }} -n cert-manager --timeout=300s
      loop:
        - cert-manager
        - cert-manager-cainjector
        - cert-manager-webhook
      changed_when: false
      retries: 3
      delay: 15
      register: cert_manager_wait
      until: cert_manager_wait.rc == 0
