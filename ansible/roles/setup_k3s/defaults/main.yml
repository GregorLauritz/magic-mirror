---
k3s_version: v1.32.4+k3s1
k3s_config_dir: /etc/rancher/k3s

# Cilium CNI with WireGuard encryption
cilium_version: 0.18.5
cilium_helm_version: 1.17.4

# cert-manager for Let's Encrypt
cert_manager_version: v1.17.2

# Let's Encrypt configuration
# Set letsencrypt_enabled to true and provide a public domain + email
# to use Let's Encrypt instead of mkcert certificates
letsencrypt_enabled: false
letsencrypt_email: ""
letsencrypt_domain: ""
# Use "letsencrypt-staging" for testing, "letsencrypt-prod" for production
letsencrypt_issuer: letsencrypt-staging
