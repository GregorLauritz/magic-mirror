---
- name: Converge
  hosts: all
  gather_facts: true

  vars:
    # Normally supplied via vars_prompt in setup_env.yml
    oauth2_client_id: test-client-id
    client_secret: test-secret
    geocode_api_key: test-api-key
    user_domain: fritz.box
    # Override repo_root so files land in /tmp instead of resolving
    # relative to playbook_dir (which doesn't exist in molecule context)
    repo_root: /tmp/test-env

  pre_tasks:
    - name: Create required output directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/test-env/docker-compose
        - /tmp/test-env/oauth2-proxy

  roles:
    - setup_env
