---
- name: Verify
  hosts: all
  gather_facts: false

  tasks:
    # -------------------------------------------- pwstore directory
    - name: Stat pwstore directory
      ansible.builtin.stat:
        path: /tmp/pwstore
      register: pwstore_dir

    - name: Assert pwstore directory was created
      ansible.builtin.assert:
        that: pwstore_dir.stat.isdir
        fail_msg: "pwstore directory was not created at /tmp/pwstore"

    - name: Assert pwstore has restricted permissions (0700)
      ansible.builtin.assert:
        that: pwstore_dir.stat.mode == '0700'
        fail_msg: "pwstore has wrong permissions {{ pwstore_dir.stat.mode }}, expected 0700"

    # -------------------------------------------- all env files present
    - name: Stat all generated env files
      ansible.builtin.stat:
        path: "{{ item }}"
      register: stat_results
      loop:
        - /tmp/test-env/docker-compose/.env
        - /tmp/test-env/docker-compose/backend.env
        - /tmp/test-env/docker-compose/frontend.env
        - /tmp/test-env/docker-compose/proxy.env
        - /tmp/test-env/oauth2-proxy/oauth2-proxy.cfg

    - name: Assert all env files were created
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Expected file {{ item.item }} was not created"
      loop: "{{ stat_results.results }}"

    # -------------------------------------------- spot-check content
    - name: Read backend.env
      ansible.builtin.slurp:
        src: /tmp/test-env/docker-compose/backend.env
      register: backend_env

    - name: Assert backend.env contains server FQDN
      ansible.builtin.assert:
        that: "'fritz.box' in (backend_env.content | b64decode)"
        fail_msg: "backend.env does not contain the expected domain"
