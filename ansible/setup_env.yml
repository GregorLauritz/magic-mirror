---
# Creates all environment files required by Docker Compose.
# Generates and persists secrets (MongoDB password, cookie secret) on first run.
#
# Usage:
#   ansible-playbook ansible/setup_env.yml
#
# Required inputs (prompted interactively):
#   oauth2_client_id   - Google OAuth2 Client ID
#   client_secret      - Google OAuth2 Client Secret
#   geocode_api_key    - Geocode Maps API key (https://geocode.maps.co)
#   domain             - Local domain suffix (default: fritz.box)
#
# Generated files (in docker-compose/):
#   .env         - Docker image versions & MongoDB root credentials
#   backend.env  - Backend service configuration
#   frontend.env - Frontend service configuration
#   proxy.env    - OAuth2-Proxy credentials
#
# Generated files (in oauth2-proxy/):
#   oauth2-proxy.cfg - OAuth2-Proxy runtime configuration

- name: Setup Docker Compose environment files
  hosts: localhost
  connection: local
  gather_facts: true

  vars_prompt:
    - name: oauth2_client_id
      prompt: "Google OAuth2 Client ID"
      private: false

    - name: client_secret
      prompt: "Google OAuth2 Client Secret"
      private: true

    - name: geocode_api_key
      prompt: "Geocode Maps API Key (https://geocode.maps.co)"
      private: true

    - name: user_domain
      prompt: "Local domain suffix"
      default: "fritz.box"
      private: false

  vars:
    repo_root: "{{ playbook_dir | dirname }}"
    pw_store_dir: "{{ playbook_dir }}/pwstore"
    server_fqdn: "{{ ansible_hostname | lower }}.{{ user_domain | lower }}"
    node_version: "24-alpine3.23"
    oauth2_proxy_version: "v7.13.0-alpine"
    oauth2_scopes: "email profile https://www.googleapis.com/auth/calendar.readonly"

  tasks:
    - name: Ensure pwstore directory exists (stores generated secrets)
      ansible.builtin.file:
        path: "{{ pw_store_dir }}"
        state: directory
        mode: "0700"

    # ------------------------------------------------------------------ .env
    - name: Create docker-compose/.env
      ansible.builtin.copy:
        dest: "{{ repo_root }}/docker-compose/.env"
        mode: "0600"
        content: |
          NODE_IMG_VERSION={{ node_version }}
          MONGO_ROOT_USER=mongoadmin
          MONGO_ROOT_PW={{ lookup('ansible.builtin.password', pw_store_dir + '/mongopw.txt', chars=['ascii_letters', 'digits'], length=32) }}
          OAUTH2_PROXY_VERSION={{ oauth2_proxy_version }}

    # ----------------------------------------------------------- backend.env
    - name: Create docker-compose/backend.env
      ansible.builtin.copy:
        dest: "{{ repo_root }}/docker-compose/backend.env"
        mode: "0600"
        content: |
          FRONTEND_URL=https://{{ server_fqdn }}
          ENABLE_HTTPS=true
          MONGO_PORT=27017
          MONGO_SSL=false
          MONGO_HOSTNAME=mongo
          GEOCODE_API_KEY={{ geocode_api_key }}

    # ---------------------------------------------------------- frontend.env
    - name: Create docker-compose/frontend.env
      ansible.builtin.copy:
        dest: "{{ repo_root }}/docker-compose/frontend.env"
        mode: "0600"
        content: |
          API_BACKEND_CONTEXT=/api

    # ------------------------------------------------------------- proxy.env
    - name: Create docker-compose/proxy.env
      ansible.builtin.copy:
        dest: "{{ repo_root }}/docker-compose/proxy.env"
        mode: "0600"
        content: |
          OAUTH2_PROXY_CLIENT_ID="{{ oauth2_client_id }}"
          OAUTH2_PROXY_CLIENT_SECRET="{{ client_secret }}"
          OAUTH2_PROXY_COOKIE_SECRET="{{ lookup('ansible.builtin.password', pw_store_dir + '/cookie.txt', chars=['ascii_letters', 'digits'], length=32) }}"
          OAUTH2_PROXY_EMAIL_DOMAINS="*"

    # ------------------------------------------------- oauth2-proxy/oauth2-proxy.cfg
    - name: Create oauth2-proxy/oauth2-proxy.cfg
      ansible.builtin.copy:
        dest: "{{ repo_root }}/oauth2-proxy/oauth2-proxy.cfg"
        mode: "0600"
        content: |
          provider = "google"
          api_routes = [
            "^/api"
          ]
          cookie_secure = true
          cookie_httponly = true
          ssl_upstream_insecure_skip_verify = true
          upstreams = [
              "https://backend:3001/api/",
              "http://frontend:3000/"
          ]
          tls_cert_file="/opt/ssl/{{ server_fqdn }}.pem"
          tls_key_file="/opt/ssl/{{ server_fqdn }}.key"
          pass_access_token = true
          pass_authorization_header = true
          cookie_csrf_per_request = true
          cookie_csrf_expire = "5m"
          cookie_refresh = "15m"
          set_xauthrequest = true
          set_authorization_header = true
          skip_auth_preflight = true
          scope = "{{ oauth2_scopes }}"

    # ---------------------------------------------------------------- summary
    - name: Environment file summary
      ansible.builtin.debug:
        msg:
          - "Environment files written to docker-compose/"
          - "  .env, backend.env, frontend.env, proxy.env"
          - "OAuth2-Proxy config written to oauth2-proxy/oauth2-proxy.cfg"
          - ""
          - "Server FQDN: {{ server_fqdn }}"
          - "Make sure {{ server_fqdn }} resolves to this machine"
          - "(add to /etc/hosts or configure your router/DNS)."
          - ""
          - "Generated secrets stored in ansible/pwstore/ (git-ignored)."
