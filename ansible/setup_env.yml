---
# Creates all Docker Compose environment files for local development.
#
# Usage:
#   ansible-playbook -i ansible/inventory/inventory ansible/setup_env.yml

- name: Setup Docker Compose environment files
  hosts: local
  connection: local
  gather_facts: true

  vars_prompt:
    - name: oauth2_client_id
      prompt: "Google OAuth2 Client ID"
      private: false

    - name: client_secret
      prompt: "Google OAuth2 Client Secret"
      private: true

    - name: geocode_api_key
      prompt: "Geocode Maps API Key (https://geocode.maps.co)"
      private: true

    - name: user_domain
      prompt: "Local domain suffix"
      default: "fritz.box"
      private: false

  roles:
    - setup_env
