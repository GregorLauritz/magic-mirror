apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: magic-mirror
  labels:
    app: mongo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:8.2.3-noble
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongo-credentials
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: magic-mirror
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
