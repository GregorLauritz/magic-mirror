apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferretdb
  namespace: magic-mirror
  labels:
    app: ferretdb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ferretdb
  template:
    metadata:
      labels:
        app: ferretdb
    spec:
      containers:
        - name: ferretdb
          image: ghcr.io/ferretdb/ferretdb:latest
          ports:
            - containerPort: 27017
          env:
            - name: FERRETDB_POSTGRESQL_URL
              value: "sqlite:///state/data.sqlite"
            - name: FERRETDB_TELEMETRY
              value: "disable"
            - name: FERRETDB_LISTEN_ADDR
              value: ""
            - name: FERRETDB_LISTEN_TLS
              value: ":27017"
            - name: FERRETDB_LISTEN_TLS_CERT_FILE
              value: "/etc/certs/ferretdb.pem"
            - name: FERRETDB_LISTEN_TLS_KEY_FILE
              value: "/etc/certs/ferretdb.key"
          volumeMounts:
            - name: ferretdb-data
              mountPath: /state
            - name: ferretdb-tls
              mountPath: /etc/certs
              readOnly: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: ferretdb-data
          persistentVolumeClaim:
            claimName: ferretdb-data
        - name: ferretdb-tls
          secret:
            secretName: ferretdb-tls
---
apiVersion: v1
kind: Service
metadata:
  name: ferretdb
  namespace: magic-mirror
spec:
  selector:
    app: ferretdb
  ports:
    - port: 27017
      targetPort: 27017
