apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: magic-mirror-dev
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: node:24-alpine3.23
          command:
            - sh
            - -c
            - |
              corepack enable
              corepack prepare yarn@4.12.0 --activate
              yarn install
              exec yarn dev
          ports:
            - containerPort: 3001
            - containerPort: 9229
          workingDir: /app
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          volumeMounts:
            - name: backend-src
              mountPath: /app/src
              readOnly: true
            - name: backend-root
              mountPath: /app/package.json
              subPath: package.json
              readOnly: true
            - name: backend-root
              mountPath: /app/yarn.lock
              subPath: yarn.lock
              readOnly: true
            - name: backend-root
              mountPath: /app/.yarnrc.yml
              subPath: .yarnrc.yml
              readOnly: true
            - name: backend-root
              mountPath: /app/tsconfig.json
              subPath: tsconfig.json
              readOnly: true
            - name: backend-node-modules
              mountPath: /app/node_modules
            - name: backend-yarn-cache
              mountPath: /app/.yarn
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: backend-src
          hostPath:
            path: __REPO_ROOT__/backend/src
            type: Directory
        - name: backend-root
          hostPath:
            path: __REPO_ROOT__/backend
            type: Directory
        - name: backend-node-modules
          hostPath:
            path: __REPO_ROOT__/.dev/backend-node_modules
            type: DirectoryOrCreate
        - name: backend-yarn-cache
          hostPath:
            path: __REPO_ROOT__/.dev/backend-yarn
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: magic-mirror-dev
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      nodePort: 30001
    - name: debug
      port: 9229
      targetPort: 9229
      nodePort: 30229
