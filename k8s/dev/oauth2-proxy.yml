apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: magic-mirror-dev
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.13.0-alpine
          args:
            - --config=/opt/conf/oauth2-proxy.cfg
          ports:
            - containerPort: 443
          envFrom:
            - secretRef:
                name: oauth2-proxy-secrets
          volumeMounts:
            - name: oauth2-proxy-config
              mountPath: /opt/conf
              readOnly: true
            - name: tls-certs
              mountPath: /opt/ssl
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
      volumes:
        - name: oauth2-proxy-config
          configMap:
            name: oauth2-proxy-config
        - name: tls-certs
          secret:
            secretName: oauth2-proxy-tls
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: magic-mirror-dev
spec:
  type: NodePort
  selector:
    app: oauth2-proxy
  ports:
    - port: 443
      targetPort: 443
      nodePort: 30443
