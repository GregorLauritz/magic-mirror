apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: magic-mirror-dev
  labels:
    app: mongo
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:8.2.3-noble
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongo-credentials
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          hostPath:
            path: __REPO_ROOT__/.dev/mongo-data
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: magic-mirror-dev
spec:
  type: NodePort
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
      nodePort: 30017
