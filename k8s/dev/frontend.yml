apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: magic-mirror-dev
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: node:24-alpine3.23
          command:
            - sh
            - -c
            - |
              corepack enable
              corepack prepare yarn@4.12.0 --activate
              yarn install
              exec yarn dev
          ports:
            - containerPort: 3000
          workingDir: /app
          envFrom:
            - configMapRef:
                name: frontend-config
          volumeMounts:
            - name: frontend-src
              mountPath: /app/src
              readOnly: true
            - name: frontend-public
              mountPath: /app/public
              readOnly: true
            - name: frontend-root
              mountPath: /app/package.json
              subPath: package.json
              readOnly: true
            - name: frontend-root
              mountPath: /app/yarn.lock
              subPath: yarn.lock
              readOnly: true
            - name: frontend-root
              mountPath: /app/.yarnrc.yml
              subPath: .yarnrc.yml
              readOnly: true
            - name: frontend-root
              mountPath: /app/tsconfig.json
              subPath: tsconfig.json
              readOnly: true
            - name: frontend-root
              mountPath: /app/tsconfig.node.json
              subPath: tsconfig.node.json
            - name: frontend-root
              mountPath: /app/vite.config.ts
              subPath: vite.config.ts
              readOnly: true
            - name: frontend-root
              mountPath: /app/index.html
              subPath: index.html
              readOnly: true
            - name: frontend-node-modules
              mountPath: /app/node_modules
            - name: frontend-yarn-cache
              mountPath: /app/.yarn
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
      volumes:
        - name: frontend-src
          hostPath:
            path: __REPO_ROOT__/frontend/src
            type: Directory
        - name: frontend-public
          hostPath:
            path: __REPO_ROOT__/frontend/public
            type: Directory
        - name: frontend-root
          hostPath:
            path: __REPO_ROOT__/frontend
            type: Directory
        - name: frontend-node-modules
          hostPath:
            path: __REPO_ROOT__/.dev/frontend-node_modules
            type: DirectoryOrCreate
        - name: frontend-yarn-cache
          hostPath:
            path: __REPO_ROOT__/.dev/frontend-yarn
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: magic-mirror-dev
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
